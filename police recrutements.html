<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rejoindre la Police Nationale RP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

header {
    background: #0d2b54;
    color: white;
    padding: 15px 30px;
    display: flex;
    align-items: center;
}

header .logo {
    font-weight: bold;
    font-size: 22px;
}

header nav {
    margin-left: auto;
}

header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
}

/* HERO */
.hero {
    background: url("") center/cover;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: black;
    font-size: 32px;
    text-shadow: 0 0 0.05px black;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
}

/* FORM */
label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    font-size: 14px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

textarea {
    resize: none;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #0d2b54;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
}

button:hover {
    background: #09203e;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}

header .logo {
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 22px;
}

header .logo-img {
    height: 40px; /* Ajuste la taille du logo */
    margin-right: 10px; /* Espace entre logo et texte */
}


</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="https://www.police-nationale.interieur.gouv.fr/sites/policenationale/files/medias/images/Logo%20PN-fon%20dtransparent.png" alt="Logo Police Nationale" class="logo-img">
        POLICE NATIONALE
    </div>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Recrutement</a>
        <a href="#">Métiers</a>
        <a href="#">Contact</a>
    </nav>
</header>	

<div class="hero">
    Rejoindre la Police Nationale
</div>

<div class="container">

    <h2>Formulaire de candidature RP</h2>
    <p>Veuillez remplir les informations ci-dessous pour déposer votre candidature.</p>

    <form>

        <label>Nom</label>
        <input type="text" placeholder="Votre nom">

        <label>Prénom</label>
        <input type="text" placeholder="Votre prénom">

        <label>Âge</label>
        <input type="number" placeholder="Votre âge">

        <label>Expérience RP</label>
        <textarea rows="3" placeholder="Décrivez votre expérience RP"></textarea>

        <label>Motivations</label>
        <textarea rows="4" placeholder="Pourquoi voulez-vous rejoindre la police ?"></textarea>

        <label>Disponibilités</label>
        <select>
            <option>Matin</option>
            <option>Après-midi</option>
            <option>Soir</option>
            <option>Tout le temps</option>
        </select>

        <label>Avez-vous déjà été sanctionné RP ?</label>
        <select>
            <option>Non</option>
            <option>Oui</option>
        </select>

        <button type="button" onclick="envoyer()">Envoyer la candidature</button>

    </form>

</div>

<footer>
    © Police Nationale RP - Recrutement officiel
</footer>

<script>

function envoyer() {
    const nom = document.querySelector('input[placeholder="Votre nom"]').value;
    const prenom = document.querySelector('input[placeholder="Votre prénom"]').value;
    const age = document.querySelector('input[placeholder="Votre âge"]').value;
    const experience = document.querySelector('textarea[placeholder="Décrivez votre expérience RP"]').value;
    const motivation = document.querySelector('textarea[placeholder="Pourquoi voulez-vous rejoindre la police ?"]').value;
    const disponibilite = document.querySelector('select').value;

    fetch("https://discord.com/api/webhooks/1489677527164391666/oOHWiikPGg2Ch2HeqRpXxbvNWZS69HjDOhAW_OUbSAchRC49_YeSY7XK0BRrUGbNE6MI", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            content: `Nouvelle candidature RP :
Nom : ${nom}
Prénom : ${prenom}
Âge : ${age}
Expérience : ${experience}
Motivation : ${motivation}
Disponibilités : ${disponibilite}`
        })
    }).then(() => {
        alert("Votre candidature a été envoyée avec succès !");
    }).catch(err => console.error(err));
}
</script>
}


</body>
</html>
